services:
  stats-db:
    image: postgres:16.1
    container_name: postgres-stats
    ports:
      - "6541:5432"
    environment:
      POSTGRES_PASSWORD: 824322
      POSTGRES_USER: postgres
      POSTGRES_DB: stats
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
      retries: 10

  ewm-db:
    image: postgres:16.1
    container_name: postgres-ewm
    ports:
      - "6561:5432"
    environment:
      POSTGRES_PASSWORD: 824322
      POSTGRES_USER: postgres
      POSTGRES_DB: ewm
    volumes:
      - ./infra/db/init/ewm-schema.sql:/docker-entrypoint-initdb.d/01-ewm-schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: bitnami/kafka:3.7
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic stats.user-actions.v1 --replication-factor 1 --partitions 3 &&
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic stats.events-similarity.v1 --replication-factor 1 --partitions 3
      "
    restart: "no"

  discovery-server:
    build: ./infra/discovery-server
    image: discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    restart: on-failure

  config-server:
    build: ./infra/config-server
    image: config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - discovery-server
    environment:
      SERVER_PORT: 8888
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8888/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: on-failure

  gateway-server:
    build: ./infra/gateway-server
    image: gateway-server
    container_name: gateway-server
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
    restart: on-failure

  user-service:
    build: ./core/user-service
    image: user-service
    container_name: user-service
    depends_on:
      ewm-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
    environment:
      SERVER_PORT: 8081
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://ewm-db:5432/ewm
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 824322
    restart: on-failure

  catalog-service:
    build: ./core/catalog-service
    image: catalog-service
    container_name: catalog-service
    depends_on:
      ewm-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
    environment:
      SERVER_PORT: 8082
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://ewm-db:5432/ewm
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 824322
    restart: on-failure

  request-service:
    build: ./core/request-service
    image: request-service
    container_name: request-service
    depends_on:
      ewm-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
    environment:
      SERVER_PORT: 8083
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://ewm-db:5432/ewm
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 824322
    restart: on-failure

  stats-server:
    build: ./stats/stats-server
    image: stats-server
    container_name: stats-server
    ports:
      - "9090:9090"
    depends_on:
      stats-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
    environment:
      SERVER_PORT: 9090
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 824322
    restart: on-failure

  event-service:
    build: ./core/event-service
    image: event-service
    container_name: event-service
    depends_on:
      ewm-db:
        condition: service_healthy
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started
      stats-server:
        condition: service_started
    environment:
      SERVER_PORT: 8084
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://ewm-db:5432/ewm
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 824322
      STATS_SERVER_SERVICE_ID: stats-server
    restart: on-failure

  collector:
    build: ./stats/collector
    image: collector
    container_name: collector
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure

  aggregator:
    build: ./stats/aggregator
    image: aggregator
    container_name: aggregator
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure

  analyzer:
    build: ./stats/analyzer
    image: analyzer
    container_name: analyzer
    depends_on:
      ewm-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://ewm-db:5432/ewm
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 824322
    restart: on-failure