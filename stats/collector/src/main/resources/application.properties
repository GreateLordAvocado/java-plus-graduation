spring.application.name=collector
server.port=0

spring.config.import=optional:configserver:

spring.cloud.config.discovery.enabled=true
spring.cloud.config.discovery.service-id=config-server

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
collector.kafka.topic.user-actions=${COLLECTOR_KAFKA_TOPIC_USER_ACTIONS:stats.user-actions.v1}
spring.kafka.admin.fail-fast=false