server.port=8080

spring.main.web-application-type=reactive

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.uuid}

management.endpoints.web.exposure.include=health,info

spring.cloud.gateway.discovery.locator.enabled=false

spring.cloud.gateway.routes[0].id=ewm-admin
spring.cloud.gateway.routes[0].uri=lb://ewm-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/admin,/admin/**

spring.cloud.gateway.routes[1].id=ewm-categories
spring.cloud.gateway.routes[1].uri=lb://ewm-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/categories,/categories/**

spring.cloud.gateway.routes[2].id=ewm-compilations
spring.cloud.gateway.routes[2].uri=lb://ewm-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/compilations,/compilations/**

spring.cloud.gateway.routes[3].id=ewm-events
spring.cloud.gateway.routes[3].uri=lb://ewm-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/events,/events/**

spring.cloud.gateway.routes[4].id=ewm-users
spring.cloud.gateway.routes[4].uri=lb://ewm-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/users,/users/**