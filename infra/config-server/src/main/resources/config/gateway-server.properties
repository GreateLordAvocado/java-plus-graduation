server.port=8080

spring.main.web-application-type=reactive

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.uuid}

management.endpoints.web.exposure.include=*

spring.cloud.gateway.discovery.locator.enabled=false

spring.cloud.gateway.routes[0].id=user-admin-users-root
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/admin/users

spring.cloud.gateway.routes[1].id=user-admin-users-all
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/admin/users/**

spring.cloud.gateway.routes[2].id=main-admin-root
spring.cloud.gateway.routes[2].uri=lb://main-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/admin

spring.cloud.gateway.routes[3].id=main-admin-all
spring.cloud.gateway.routes[3].uri=lb://main-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/admin/**

spring.cloud.gateway.routes[4].id=main-categories-root
spring.cloud.gateway.routes[4].uri=lb://main-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/categories

spring.cloud.gateway.routes[5].id=main-categories-all
spring.cloud.gateway.routes[5].uri=lb://main-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/categories/**

spring.cloud.gateway.routes[6].id=main-compilations-root
spring.cloud.gateway.routes[6].uri=lb://main-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/compilations

spring.cloud.gateway.routes[7].id=main-compilations-all
spring.cloud.gateway.routes[7].uri=lb://main-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/compilations/**

spring.cloud.gateway.routes[8].id=main-events-root
spring.cloud.gateway.routes[8].uri=lb://main-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/events

spring.cloud.gateway.routes[9].id=main-events-all
spring.cloud.gateway.routes[9].uri=lb://main-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/events/**

spring.cloud.gateway.routes[10].id=main-users-root
spring.cloud.gateway.routes[10].uri=lb://main-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/users

spring.cloud.gateway.routes[11].id=main-users-all
spring.cloud.gateway.routes[11].uri=lb://main-service
