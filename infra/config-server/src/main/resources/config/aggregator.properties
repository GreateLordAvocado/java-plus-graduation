server.port=0

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.uuid}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.consumer.group-id=aggregator
spring.kafka.consumer.auto-offset-reset=earliest

aggregator.kafka.topic.user-actions=stats.user-actions.v1
aggregator.kafka.topic.events-similarity=stats.events-similarity.v1

recommendation.weights.view=0.4
recommendation.weights.register=0.8
recommendation.weights.like=1.0